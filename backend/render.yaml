services:
  - type: web
    name: uvce-exammate-ai-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: OFFLINE_MODE
        value: "False"
      - key: CHROMA_PERSIST_DIR
        value: /opt/render/project/src/chroma_db
      - key: DATA_DIR
        value: /opt/render/project/src/data/pdfs
